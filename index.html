<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GoNuts Bites - Wrap Dip Enjoy!</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #fff8f0;
      color: #4e342e;
    }
    header {
      background: #4CAF50;
      color: white;
      padding: 1.5rem;
      text-align: center;
    }
    h1 {
      font-size: 2.5rem;
      margin: 0;
    }
    h2 {
      font-size: 1.2rem;
      margin-top: 0.5rem;
      color: #FF9800;
    }
    .hero {
      text-align: center;
      padding: 2rem 1rem;
    }
    .hero img {
      max-width: 300px;
      margin: 1rem;
    }
    .price {
      font-size: 1.5rem;
      color: #D2691E;
      font-weight: bold;
    }
    .features {
      background: #fff3e0;
      padding: 1rem 2rem;
      margin: 2rem auto;
      max-width: 600px;
      border-radius: 10px;
    }
    .features ul {
      list-style: none;
      padding: 0;
    }
    .features li {
      margin: 0.5rem 0;
      font-size: 1rem;
    }
    .cta {
      text-align: center;
      margin: 2rem 0;
    }
    .cta button {
      background: #FF9800;
      color: white;
      border: none;
      padding: 1rem 2rem;
      font-size: 1.2rem;
      border-radius: 8px;
      cursor: pointer;
    }
    footer {
      background: #8D6E63;
      color: white;
      text-align: center;
      padding: 1rem;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <header>
    <h1>GoNuts Bites</h1>
    <h2>WRAP • DIP • ENJOY!</h2>
  </header>

  <section class="hero">
    <img src="wrap-slice.png" alt="Gado-Gado Roll" />
    <img src="sambal-kacang.png" alt="Sambal Kacang Pecel" />
    <p class="price">Mulai Rp12.000 / 4 pcs</p>
  </section>

  <section class="features">
    <h3>Kenapa GoNuts?</h3>
    <ul>
      <li>✅ Sayuran segar & bergizi</li>
      <li>✅ Saus kacang pecel khas Indonesia</li>
      <li>✅ Praktis & bisa dinikmati kapan saja</li>
      <li>✅ Kemasan ramah lingkungan</li>
    </ul>
  </section>

  <div class="cta">
    <button>PESAN SEKARANG</button>
  </div>

  <footer>
    Business Project 2026 – Fakultas Bisnis<br />
    Tim: Alexander, Cindy, Fuad, Shirley
  </footer>

</body>
</html>
